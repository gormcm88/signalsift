<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalSift Dashboard</title>
  <style>
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 38px; margin: 0 0 10px; }
    p { color: #475569; font-size: 17px; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; }
    ul { padding-left: 20px; }
    pre { background: #0f172a; color: #e2e8f0; border-radius: 12px; padding: 16px; overflow: auto; }
    @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SignalSift dashboard</h1>
    <p>Local MVP dashboard. It reads watchlist, snapshots, and alerts from static JSON files generated by the monitor script.</p>
    <div class="grid">
      <section class="card">
        <h2>Recent alerts</h2>
        <ul id="alerts"></ul>
      </section>
      <section class="card">
        <h2>Watchlist</h2>
        <ul id="watchlist"></ul>
      </section>
    </div>
    <section class="card" style="margin-top:20px;">
      <h2>Latest snapshots</h2>
      <pre id="snapshots"></pre>
    </section>
  </div>
  <script>
    async function load(path) { const r = await fetch(path); return r.json(); }
    Promise.all([
      load('./watchlist.json'),
      load('./snapshots.json'),
      load('./alerts.json')
    ]).then(([watchlist, snapshots, alerts]) => {
      const localWatchlist = JSON.parse(localStorage.getItem('signalsift-watchlist') || '[]');
      document.getElementById('watchlist').innerHTML = watchlist.map(x => `<li><strong>${x.company}</strong> — ${x.url}</li>`).join('') || '<li>No file-based targets yet.</li>';
      document.getElementById('local-watchlist').innerHTML = localWatchlist.map(x => `<li><strong>${x.company}</strong> — ${x.url}</li>`).join('') || '<li>No browser-side targets yet. Use watchlist editor.</li>';
      document.getElementById('alerts').innerHTML = alerts.slice().reverse().slice(0, 15).map(a => `<li><strong>${a.company}</strong>: ${a.signals.join(', ')}<br>${a.angle}</li>`).join('') || '<li>No alerts yet.</li>';
      document.getElementById('snapshots').textContent = JSON.stringify(snapshots, null, 2);
    });
  </script>
</body>
</html>
